<!--
  Redirect shim — preserves the existing "← Overview" link inside every
  static section guide under this candidate's folder.

  Those links look like `href="../index.html"`. After build, that resolves
  to `<base>/candidates/xinfeng/index.html` (this file), which forwards the
  browser to the React-routed agenda overview.

  Do NOT add visible content here.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>interview</title>
    <meta http-equiv="refresh" content="0; url=../../#/candidate/xinfeng">
    <script>
      // ../../ goes from /candidates/xinfeng/ back up to the app root, then
      // append the hash route. Works under any Vite base.
      location.replace('../../#/candidate/xinfeng');
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="../../#/candidate/xinfeng">Xinfeng's agenda overview</a>…</p>
  </body>
</html>
